<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cito Console</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.4rem; }
    fieldset { border: 1px solid #ccc; border-radius: 8px; margin-bottom: 1rem; }
    textarea { width: 100%; min-height: 8rem; font-size: 1rem; padding: .5rem; box-sizing: border-box; }
    button { font-size: 1rem; padding: .5rem 1rem; margin-right: .5rem; cursor: pointer; }
    #status { margin-top: 1rem; color: #555; min-height: 1.2rem; }
    label { display: inline-block; margin-right: 1rem; }
  </style>
</head>
<body>
  <h1>Cito — Announcement Console</h1>
  <fieldset>
    <legend>Data pipelines</legend>
    <label><input type="checkbox" id="src-weather" value="weather" /> Weather</label>
    <label><input type="checkbox" id="src-stocks" value="stocks" /> Stocks</label>
    <label><input type="checkbox" id="src-calendar" value="calendar" /> Calendar</label>
  </fieldset>
  <fieldset>
    <legend>Calendar feed</legend>
    <input type="text" id="cal-url" placeholder="https://…/basic.ics"
           style="width:70%; padding:.4rem;" />
    <button id="cal-save">Save URL</button>
    <div id="cal-status" style="margin-top:.4rem; color:#555;"></div>
  </fieldset>
  <fieldset>
    <legend>Document</legend>
    <input type="file" id="doc-file" accept=".txt,.docx,.pdf" />
    <button id="doc-load">Load document</button>
    <span id="doc-toggle-wrap" style="display:none;">
      <label><input type="checkbox" id="doc-include" checked /> <span id="doc-name"></span></label>
      <button id="doc-clear">Clear</button>
    </span>
    <div id="doc-status" style="margin-top:.4rem; color:#555;"></div>
  </fieldset>
  <fieldset>
    <legend>Voice / personality</legend>
    <label for="preset">Preset:</label>
    <select id="preset"></select>
    <textarea id="voice" placeholder="How should announcements sound? (tone, priorities)"
              style="min-height:4rem; margin-top:.5rem;"></textarea>
    <div style="margin-top:.5rem;">
      <button id="save-voice">Save voice</button>
      <button id="preview">Preview</button>
    </div>
    <div id="preview-out" style="margin-top:.5rem; font-style:italic; color:#333;"></div>
  </fieldset>
  <p>Tick sources and <b>Generate</b>, or just type a custom message below, then <b>Send</b>.</p>
  <textarea id="text" placeholder="Announcement text..."></textarea>
  <div style="margin-top:.5rem;">
    <button id="generate">Generate</button>
    <button id="send">Send</button>
  </div>
  <div id="status"></div>

  <script>
    const $ = (id) => document.getElementById(id);
    const status = (msg) => { $("status").textContent = msg; };

    function selectedSources() {
      return ["weather", "stocks", "calendar"].filter((s) => $("src-" + s).checked);
    }

    // --- document upload ---
    let DOC_TEXT = "";
    function docIncluded() { return DOC_TEXT && $("doc-include").checked; }
    $("doc-load").onclick = async () => {
      const f = $("doc-file").files[0];
      if (!f) { $("doc-status").textContent = "Choose a file first."; return; }
      $("doc-status").textContent = "Loading " + f.name + "...";
      const fd = new FormData(); fd.append("file", f);
      const r = await fetch("/upload", { method: "POST", body: fd });
      if (!r.ok) {
        DOC_TEXT = "";
        $("doc-toggle-wrap").style.display = "none";
        $("doc-status").textContent = "Rejected: " + ((await r.json()).detail || "upload failed");
        return;
      }
      const data = await r.json();
      DOC_TEXT = data.text;
      $("doc-name").textContent = "Document: " + data.filename + " (" + data.chars + " chars)";
      $("doc-include").checked = true;
      $("doc-toggle-wrap").style.display = "inline";
      $("doc-status").textContent = "Loaded.";
    };
    $("doc-clear").onclick = () => {
      DOC_TEXT = "";
      $("doc-toggle-wrap").style.display = "none";
      $("doc-file").value = "";
      $("doc-status").textContent = "Document cleared.";
    };

    // --- voice editor ---
    let PRESETS = {};
    async function loadConfig() {
      const cfg = await (await fetch("/config")).json();
      PRESETS = cfg.presets || {};
      const sel = $("preset");
      sel.innerHTML = "";
      for (const name of Object.keys(PRESETS)) {
        const o = document.createElement("option");
        o.value = name; o.textContent = name; sel.appendChild(o);
      }
      if (cfg.preset) sel.value = cfg.preset;
      $("voice").value = cfg.voice || "";
      $("cal-url").value = cfg.calendar_url || "";
    }
    $("preset") && ($("preset").onchange = () => { $("voice").value = PRESETS[$("preset").value] || ""; });
    $("save-voice").onclick = async () => {
      status("Saving voice...");
      const r = await fetch("/voice", {
        method: "POST", headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ voice: $("voice").value, preset: $("preset").value }),
      });
      const data = await r.json();
      $("voice").value = data.voice;
      status("Voice saved.");
    };
    $("preview").onclick = async () => {
      const sources = selectedSources();
      const document_text = docIncluded() ? DOC_TEXT : "";
      if (sources.length === 0 && !document_text) {
        status("Tick a source or load a document to preview."); return;
      }
      status("Previewing...");
      const r = await fetch("/preview", {
        method: "POST", headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ sources, voice: $("voice").value, document_text }),
      });
      const data = await r.json();
      $("preview-out").textContent = "Preview: " + data.text;
      status("Preview ready (not sent).");
    };
    loadConfig();
    $("cal-save").onclick = async () => {
      $("cal-status").textContent = "Saving calendar URL...";
      const r = await fetch("/calendar", {
        method: "POST", headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ url: $("cal-url").value }),
      });
      if (!r.ok) { $("cal-status").textContent = "Rejected: " + ((await r.json()).detail || "bad URL"); return; }
      const data = await r.json();
      $("cal-url").value = data.calendar_url;
      $("cal-status").textContent = "Calendar URL saved.";
    };

    $("generate").onclick = async () => {
      const sources = selectedSources();
      const document_text = docIncluded() ? DOC_TEXT : "";
      if (sources.length === 0 && !document_text) {
        status("Tick a source or load a document first."); return;
      }
      status("Generating...");
      try {
        const r = await fetch("/generate", {
          method: "POST", headers: {"Content-Type": "application/json"},
          body: JSON.stringify({ sources, document_text }),
        });
        const data = await r.json();
        $("text").value = data.text;
        status("Generated. Edit if you like, then Send.");
      } catch (e) { status("Generate failed: " + e); }
    };

    $("send").onclick = async () => {
      const text = $("text").value.trim();
      if (!text) { status("Nothing to send — type or generate a message first."); return; }
      status("Sending...");
      try {
        const r = await fetch("/send", {
          method: "POST", headers: {"Content-Type": "application/json"},
          body: JSON.stringify({ text }),
        });
        if (!r.ok) { status("Send rejected: " + (await r.text())); return; }
        const data = await r.json();
        status("Sent " + data.packets + " packets to the multicast stream.");
      } catch (e) { status("Send failed: " + e); }
    };
  </script>
</body>
</html>
